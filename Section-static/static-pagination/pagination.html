<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pagination.css">
    <title>Pagination | Componet</title>
</head>

<body>
    <div class="pagination">
        <button class="btn btn-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
        </button>

        <button class="btn number"><a href="#">1</a></button>
        <button class="btn number"><a href="#">2</a></button>
        <button class="btn number"><a href="#">3</a></button>
        <button class="btn number"><a href="#">4</a></button>
        <button class="btn number"><a href="#">5</a></button>
        <button class="btn number"><a href="#">6</a></button>
        <button class="btn number"><a href="#">7</a></button>
        <span>...</span>
        <button class="btn number"><a href="#">22</a></button>

        <button class="btn btn-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor" class="icon">
                <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>

        </button>
    </div>
</body>

</html>
